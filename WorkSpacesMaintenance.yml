                            if response['FailedRequests']:
                                print(f"Failed reboot requests: {response['FailedRequests']}")
                            sleep(2)
                        except Exception as e:
                            print(f"Error processing reboot batch: {str(e)}")
                    
                    return {'StatusCode': 200, 'Message': 'WorkSpace reboot operations completed'}
