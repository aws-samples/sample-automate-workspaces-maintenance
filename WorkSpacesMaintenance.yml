            nextStep: branchStopWorkspaces
            isEnd: false
            inputs:
              Script: |-
                def script_handler(events, context):
                    import boto3
                    import json
                    
                    s3 = boto3.client('s3')
                    workspaces = boto3.client('workspaces')
                    state_bucket = events['stateBucket']
                    state_prefix = f"maintenance-state/{events['directoryId']}/{events['executionId']}"
                    
                    try:
                        obj = s3.get_object(Bucket=state_bucket, Key=f"{state_prefix}/managed-instances.json")
                        data = json.loads(obj['Body'].read().decode('utf-8'))
                    except s3.exceptions.NoSuchKey:
                        print("No managed-instances.json found, skipping")
                        return {'StatusCode': 200, 'Message': 'No state file found, skipping'}
                    
                    for workspace_id in data.get('matchedWorkspaceIds', []):
                        try:
                            workspaces.modify_workspace_state(WorkspaceId=str(workspace_id), WorkspaceState='AVAILABLE')
                            print(f"Set WorkSpace {workspace_id} to Available")
                        except Exception as e:
                            print(f"Error processing workspace {workspace_id}: {str(e)}")
                    
                    return {'StatusCode': 200, 'Message': 'WorkSpaces set to AVAILABLE state'}
              Runtime: python3.11
              InputPayload:
                stateBucket: '{{ StateBucket }}'
                directoryId: '{{ getWorkspaces.directoryId }}'
                executionId: '{{ automation:EXECUTION_ID }}'
              Handler: script_handler

          - name: branchStopWorkspaces
            action: aws:branch
            inputs:
              Choices:
                - NextStep: stopWorkspaces
                  Variable: '{{ StopWorkspaces }}'
                  StringEquals: 'Yes'
              Default: branchSnsNotification

          - name: stopWorkspaces
            action: aws:executeScript
            nextStep: branchSnsNotification
            isEnd: false
            inputs:
              Script: |-
                def script_handler(events, context):
                    import boto3
                    import json
                    
                    s3 = boto3.client('s3')
                    workspaces = boto3.client('workspaces')
                    state_bucket = events['stateBucket']
                    directory_id = events['directoryId']
                    state_prefix = f"maintenance-state/{directory_id}/{events['executionId']}"
                    
                    try:
                        obj = s3.get_object(Bucket=state_bucket, Key=f"{state_prefix}/managed-instances.json")
                        data = json.loads(obj['Body'].read().decode('utf-8'))
                    except s3.exceptions.NoSuchKey:
                        print("No managed-instances.json found, skipping")
                        return {'StatusCode': 200, 'Message': 'No state file found, skipping'}
                    
                    workspace_ids = data.get('matchedWorkspaceIds', [])
                    
                    # Look up running modes directly from WorkSpaces API
                    running_modes = {}
                    paginator = workspaces.get_paginator('describe_workspaces')
                    for page in paginator.paginate(DirectoryId=directory_id):
                        for ws in page['Workspaces']:
                            if ws['WorkspaceId'] in workspace_ids:
                                running_modes[ws['WorkspaceId']] = ws.get('WorkspaceProperties', {}).get('RunningMode', 'UNKNOWN')
                    
                    workspaces_to_stop = [wid for wid in workspace_ids if running_modes.get(wid) == 'AUTO_STOP']
                    
                    if not workspaces_to_stop:
                        print("No AUTO_STOP WorkSpaces to stop")
                        return {'StatusCode': 200, 'Message': 'No WorkSpaces needed to be stopped'}
                    
                    batch_size = 25
                    for i in range(0, len(workspaces_to_stop), batch_size):
                        batch = workspaces_to_stop[i:i + batch_size]
                        try:
                            response = workspaces.stop_workspaces(
                                StopWorkspaceRequests=[{'WorkspaceId': w_id} for w_id in batch]
                            )
                            if response['FailedRequests']:
                                print(f"Failed requests: {response['FailedRequests']}")
                        except Exception as e:
                            print(f"Error stopping workspaces batch: {str(e)}")
                    
                    return {
                        'StatusCode': 200,
                        'Message': f'Completed stop requests for {len(workspaces_to_stop)} AUTO_STOP WorkSpaces'
                    }
              Runtime: python3.11
              InputPayload:
                stateBucket: '{{ StateBucket }}'
                directoryId: '{{ getWorkspaces.directoryId }}'
                executionId: '{{ automation:EXECUTION_ID }}'
              Handler: script_handler

          - name: branchSnsNotification
            action: aws:branch
            isEnd: true
            inputs:
              Choices:
                - NextStep: sendSummary
                  Variable: '{{ SnsTopicArn }}'
                  Contains: arn

          - name: sendSummary
            action: aws:executeScript
            nextStep: branchComplianceReport
            inputs:
              Script: |-
                def script_handler(events, context):
                    import boto3
                    import json
                    
                    s3 = boto3.client('s3')
                    sns = boto3.client('sns')
                    state_bucket = events['stateBucket']
                    state_prefix = f"maintenance-state/{events['directoryId']}/{events['executionId']}"
                    
                    def read_state(key):
                        try:
                            obj = s3.get_object(Bucket=state_bucket, Key=f"{state_prefix}/{key}")
                            return json.loads(obj['Body'].read().decode('utf-8'))
                        except Exception:
                            return {}
                    
                    ws_data = read_state('workspaces.json')
                    mi_data = read_state('managed-instances.json')
                    ping_data = read_state('ping-status.json')
                    post_data = read_state('post-patch-details.json')
                    
                    excluded = ws_data.get('excludedWorkspaces', [])
                    unmanaged = mi_data.get('unmanagedWorkspaceIds', [])
                    offline = ping_data.get('offlineInstances', [])
                    post_details = post_data.get('postPatchDetails', [])
                    
                    message = "WorkSpaces Patching Summary\n"
                    message += "===========================\n\n"
                    message += f"Initial Discovery:\n------------------\n"
                    message += f"Found {events['workspaceCount']} WorkSpace(s) eligible for patching\n"
                    message += f"{events['excludedCount']} WorkSpace(s) excluded from patching due to tags"
                    if excluded:
                        message += f":\n{', '.join(excluded)}"
                    
                    message += f"\n\nSystems Manager Status:\n-----------------------\n"
                    message += f"Found {events['unmanagedCount']} WorkSpace(s) not managed by Systems Manager"
                    if unmanaged:
                        message += f":\n{', '.join(unmanaged)}"
                    
                    message += f"\n\nTotal WorkSpaces to be patched: {events['matchedWorkspacesCount']}"
                    
                    message += f"\n\nSSM Ping Status Before Patching:\n--------------------------------\n"
                    message += f"Online instances: {events['onlineCount']}\n"
                    message += f"Offline instances: {events['offlineCount']}"
                    if offline:
                        message += "\nOffline instance details:\n"
                        for inst in offline:
                            message += f"- {inst}\n"
                    
                    message += f"\nPatch Execution Details:\n------------------------\n"
                    cmd_data = read_state('patch-command-ids.json')
                    command_ids = cmd_data.get('commandIds', [])
                    if command_ids:
                        message += f"Systems Manager Run Command IDs: {', '.join(command_ids)}\n"
                    message += f"Successfully patched: {events['successCount']} WorkSpaces\n"
                    message += f"Failed to patch: {events['failedCount']} WorkSpaces\n"
                    
                    status_data = read_state('patch-status-detail.json')
                    final_status = status_data.get('finalStatus', [])
                    
                    message += f"\nDetailed Patch Status:\n----------------------\n"
                    for status in final_status:
                        message += f"{status}\n"
                    
                    if events.get('updateDrivers') == 'Yes':
                        message += f"\nAWS Driver Updates:\n-------------------\n"
                        message += "Driver updates were enabled during maintenance.\n"
                        message += "NVMe and ENA drivers updated for all WorkSpaces\n"
                    else:
                        message += "\nAWS Driver Updates: Disabled\n"
                    
                    message += f"\nPost-Patch Details:\n-------------------\n"
                    if post_details:
                        for detail in post_details:
                            message += f"{detail}\n\n"
                    else:
                        message += "Post-patch details not available\n"
                    
                    try:
                        sns.publish(
                            TopicArn=events['snsTopicArn'],
                            Subject='WorkSpaces Patching Automation Summary',
                            Message=message
                        )
                        print("SNS notification sent successfully")
                    except Exception as e:
                        print(f"Error sending SNS notification: {str(e)}")
                        raise
                    
                    return {'StatusCode': 200, 'Message': 'SNS notification sent'}
              Runtime: python3.11
              InputPayload:
                unmanagedCount: '{{ getManagedInstances.unmanagedCount }}'
                matchedWorkspacesCount: '{{ getManagedInstances.matchedWorkspacesCount }}'
                onlineCount: '{{ monitorPingStatus.onlineCount }}'
                offlineCount: '{{ monitorPingStatus.offlineCount }}'
                failedCount: '{{ recordPatchResults.failedCount }}'
                snsTopicArn: '{{ SnsTopicArn }}'
                workspaceCount: '{{ getWorkspaces.workspaceCount }}'
                successCount: '{{ recordPatchResults.successCount }}'
                excludedCount: '{{ getWorkspaces.excludedCount }}'
                updateDrivers: '{{ UpdateAWSDrivers }}'
                stateBucket: '{{ StateBucket }}'
                directoryId: '{{ getWorkspaces.directoryId }}'
                executionId: '{{ automation:EXECUTION_ID }}'
              Handler: script_handler

          - name: branchComplianceReport
            action: aws:branch
            isEnd: true
            inputs:
              Choices:
                - NextStep: generateComplianceReport
                  Variable: '{{ GenerateComplianceReport }}'
                  StringEquals: 'Yes'

          - name: generateComplianceReport
            action: aws:executeScript
            timeoutSeconds: 900
            isEnd: true
            inputs:
              Script: |-
                def script_handler(events, context):
                    import boto3, json, time
                    
                    client = boto3.client('lambda')
                    # Invoke asynchronously to avoid blocking timeout
                    client.invoke(
                        FunctionName=events['functionName'],
                        InvocationType='Event',
                        Payload=json.dumps({
                            'PatchGroup': events['patchGroup'],
                            'DirectoryId': events['directoryId']
                        })
                    )
                    print(f"Lambda invoked asynchronously: {events['functionName']}")
                    return {'status': 'Lambda invoked asynchronously'}
              Runtime: python3.11
              InputPayload:
                functionName: !If 
                  - GenerateReport
                  - !Ref ComplianceReportLambda
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:dummy'
                patchGroup: 'WorkSpaces-{{ getWorkspaces.directoryId }}'
                directoryId: '{{ getWorkspaces.directoryId }}'
              Handler: script_handler

  WorkSpacesMaintenanceWindowTask:
    Type: AWS::SSM::MaintenanceWindowTask
    DependsOn: WorkSpacesMaintenanceRole
    Properties:
      WindowId: !Ref WorkSpacesMaintenanceWindow
      Name: !Sub 'WorkSpacesMaintenance-${DirectoryId}-Task'
      TaskType: AUTOMATION
      TaskArn: !Ref WorkspacePatchingDocument
      ServiceRoleArn: !GetAtt WorkSpacesMaintenanceRole.Arn
      Priority: 1
      TaskParameters:
        AutomationAssumeRole:
          Values:
            - !GetAtt WorkSpacesMaintenanceRole.Arn
        CloudWatchLogGroupName:
          Values:
            - !Sub '${CloudWatchLogGroupName}/${DirectoryId}'
        StopWorkspaces:
          Values:
            - 'Yes'
        Action:
          Values:
            - 'Install'
        SnsTopicArn:
          Values:
            - !If 
              - CreateNewSnsTopic
              - !Ref WorkSpacesPatchingTopic
              - !Ref SnsTopicArn
        AllowReboot:
          Values:
            - 'RebootIfNeeded'
        ExcludeKBs:
          Values:
            - 'KB5007651'
        GenerateComplianceReport:
          Values:
            - !Ref GenerateComplianceReport
        UpdateAWSDrivers:
          Values:
            - !Ref UpdateAWSDrivers
        StateBucket:
          Values:
            - !Ref MaintenanceStateBucket

Outputs:
  AutomationDocumentArn:
    Description: ARN of the created SSM Automation document
    Value: !Ref WorkspacePatchingDocument
  WorkSpacesMaintenanceRoleArn:
    Description: ARN of the created WorkSpacesMaintenance IAM role
    Value: !GetAtt WorkSpacesMaintenanceRole.Arn
  MaintenanceWindowId:
    Description: ID of the created Maintenance Window
    Value: !Ref WorkSpacesMaintenanceWindow
  WindowsPatchBaselineId:
    Description: ID of the created Windows Patch Baseline for WorkSpaces
    Value: !Ref WorkSpacesPatchBaseline
    Condition: CreatePatchBaselines
  RockyLinuxPatchBaselineId:
    Description: ID of the created Rocky Linux Patch Baseline for WorkSpaces
    Value: !Ref WorkSpacesRockyLinuxPatchBaseline
    Condition: CreatePatchBaselines
  AmazonLinux2PatchBaselineId:
    Description: ID of the created Amazon Linux 2 Patch Baseline for WorkSpaces
    Value: !Ref WorkSpacesAmazonLinux2PatchBaseline
    Condition: CreatePatchBaselines
  UbuntuPatchBaselineId:
    Description: ID of the created Ubuntu Patch Baseline for WorkSpaces
    Value: !Ref WorkSpacesUbuntuPatchBaseline
    Condition: CreatePatchBaselines
  RedHatPatchBaselineId:
    Description: ID of the created Red Hat Enterprise Linux Patch Baseline for WorkSpaces
    Value: !Ref WorkSpacesRedHatPatchBaseline
    Condition: CreatePatchBaselines
  NotificationTopicArn:
    Description: ARN of the SNS Topic used for notifications
    Value: !If 
      - CreateNewSnsTopic
      - !Ref WorkSpacesPatchingTopic
      - !Ref SnsTopicArn
  DirectoryIdentifier:
    Description: Directory ID associated with this maintenance configuration
    Value: !Ref DirectoryId
  ComplianceReportBucketName:
    Description: Name of the S3 bucket for compliance reports (if created)
    Value: !If 
      - CreateReportBucket
      - !Ref ComplianceReportS3Bucket
      - !Ref ComplianceReportBucket
    Condition: GenerateReport
  ComplianceReportLambdaArn:
    Description: ARN of the Lambda function for generating compliance reports
    Value: !GetAtt ComplianceReportLambda.Arn
    Condition: GenerateReport
  CloudWatchLogGroupName:
    Description: Name of the CloudWatch Log Group for maintenance operations
    Value: !Ref CloudWatchLogGroupName
  CloudWatchLogGroupArn:
    Description: ARN of the CloudWatch Log Group for maintenance operations (if created)
    Value: !If 
      - CreateLogGroup
      - !GetAtt WorkSpacesMaintenanceLogGroup.Arn
      - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:${CloudWatchLogGroupName}'
  MaintenanceStateBucketName:
    Description: Name of the S3 bucket used for automation state between steps
    Value: !Ref MaintenanceStateBucket
