          - description: Verify all managed WorkSpace instances are reporting as online in Systems Manager, proceeds after 10min regardless
            name: monitorPingStatus
            action: aws:executeScript
            timeoutSeconds: 599
            nextStep: getDirectoryTenancy
            isCritical: false
            isEnd: false
            onFailure: Continue
            inputs:
              Script: |-
                def script_handler(events, context):
                    import boto3
                    import time
                    from datetime import datetime, timedelta
                    
                    def make_api_call_with_retry(ssm_client, instance_ids, max_retries=3):
                        for attempt in range(max_retries):
                            try:
                                return ssm_client.describe_instance_information(
                                    InstanceInformationFilterList=[
                                        {
                                            'key': 'InstanceIds',
                                            'valueSet': instance_ids
                                        }
                                    ]
                                )
                            except Exception as e:
                                if attempt == max_retries - 1:
                                    raise
                                time.sleep(2 ** attempt)
                    
                    ssm = boto3.client('ssm')
                    instance_ids = events['instanceIds']
                    timeout = datetime.now() + timedelta(minutes=10)
                    
                    while datetime.now() < timeout:
                        try:
                            response = make_api_call_with_retry(ssm, instance_ids)
                            
                            connection_states = {
                                'Online': [],
                                'ConnectionLost': [],
                                'Inactive': [],
                                'NotFound': []
                            }
                            
                            remaining_instances = set(instance_ids)
                            
                            for instance in response['InstanceInformationList']:
                                instance_id = instance['InstanceId']
                                ping_status = instance['PingStatus']
                                platform = instance.get('PlatformType', 'Unknown')
                                ip_address = instance.get('IPAddress', 'Unknown')
                                
                                instance_info = f"{instance_id}: {ping_status} (Platform: {platform}, IP: {ip_address})"
                                
                                if ping_status == 'Online':
                                    connection_states['Online'].append(instance_info)
                                elif ping_status == 'ConnectionLost':
                                    connection_states['ConnectionLost'].append(instance_info)
                                elif ping_status == 'Inactive':
                                    connection_states['Inactive'].append(instance_info)
                                    
                                remaining_instances.discard(instance_id)
                            
                            for instance_id in remaining_instances:
                                connection_states['NotFound'].append(f"{instance_id}: Not Found in SSM")
                            
                            online_count = len(connection_states['Online'])
                            offline_instances = (
                                connection_states['ConnectionLost'] +
                                connection_states['Inactive'] +
                                connection_states['NotFound']
                            )
                            
                            print(f"\nInstance Status Summary:")
                            print(f"Online: {len(connection_states['Online'])}")
                            print(f"Connection Lost: {len(connection_states['ConnectionLost'])}")
                            print(f"Inactive: {len(connection_states['Inactive'])}")
                            print(f"Not Found: {len(connection_states['NotFound'])}")
                            
                            if offline_instances:
                                print("\nOffline/Not responding instances:")
                                for instance in offline_instances:
                                    print(instance)
                            
                            if online_count == len(instance_ids):
                                print("\nAll instances are online and reporting to Systems Manager")
                                return {
                                    'StatusCode': 200,
                                    'Message': 'All instances online',
                                    'OnlineCount': online_count,
                                    'OfflineCount': len(offline_instances),
                                    'OfflineInstances': offline_instances,
                                    'ConnectionStates': connection_states
                                }
                            
                            print("\nWaiting 30 seconds before next check...")
                            time.sleep(30)
                            
                        except Exception as e:
                            print(f"Error checking instance status: {str(e)}")
                            time.sleep(30)
                    
                    print("\nTimeout reached. Not all instances are reporting as online.")
                    return {
                        'StatusCode': 200,
                        'Message': 'Verification timed out - continuing with available instances',
                        'OnlineCount': online_count,
                        'OfflineCount': len(offline_instances),
                        'OfflineInstances': offline_instances,
                        'ConnectionStates': connection_states
                    }
              Runtime: python3.11
              InputPayload:
                instanceIds: '{{ getManagedInstances.instanceIds }}'
              Handler: script_handler
            outputs:
              - Type: String
                Name: onlineCount
                Selector: $.Payload.OnlineCount
              - Type: String
                Name: offlineCount
                Selector: $.Payload.OfflineCount
              - Type: StringList
                Name: offlineInstances
                Selector: $.Payload.OfflineInstances

