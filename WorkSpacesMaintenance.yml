            inputs:
              Script: |-
                def script_handler(events, context):
                    import boto3
                    import json
                    import time
                    from datetime import datetime, timedelta
                    
                    s3 = boto3.client('s3')
                    ssm = boto3.client('ssm')
                    state_bucket = events['stateBucket']
                    state_prefix = f"maintenance-state/{events['directoryId']}/{events['executionId']}"
                    
                    obj = s3.get_object(Bucket=state_bucket, Key=f"{state_prefix}/managed-instances.json")
                    data = json.loads(obj['Body'].read().decode('utf-8'))
                    instance_ids = data['instanceIds']
                    
                    def describe_instances_batched(ids):
                        """DescribeInstanceInformation limits valueSet to 100 items"""
                        all_instances = []
                        for i in range(0, len(ids), 100):
                            batch = ids[i:i + 100]
                            resp = ssm.describe_instance_information(
                                InstanceInformationFilterList=[{'key': 'InstanceIds', 'valueSet': batch}]
                            )
                            all_instances.extend(resp['InstanceInformationList'])
                        return all_instances
                    
                    timeout = datetime.now() + timedelta(minutes=10)
                    online_count = 0
                    offline_instances = []
                    
                    while datetime.now() < timeout:
                        try:
                            all_info = describe_instances_batched(instance_ids)
                            
                            online_count = sum(1 for i in all_info if i['PingStatus'] == 'Online')
                            found_ids = {i['InstanceId'] for i in all_info}
                            
                            offline_instances = []
                            for i in all_info:
                                if i['PingStatus'] != 'Online':
                                    offline_instances.append(f"{i['InstanceId']}: {i['PingStatus']}")
                            for iid in instance_ids:
                                if iid not in found_ids:
                                    offline_instances.append(f"{iid}: Not Found in SSM")
                            
                            print(f"Online: {online_count}, Offline: {len(offline_instances)}")
                            
                            if online_count == len(instance_ids):
                                print("All instances are online")
                                break
                            
                            time.sleep(30)
                        except Exception as e:
                            print(f"Error checking instance status: {str(e)}")
                            time.sleep(30)
                    
                    # Store offline instances in S3
                    s3.put_object(
                        Bucket=state_bucket,
                        Key=f"{state_prefix}/ping-status.json",
                        Body=json.dumps({'offlineInstances': offline_instances}),
                        ServerSideEncryption='AES256'
                    )
                    
                    return {
                        'OnlineCount': str(online_count),
                        'OfflineCount': str(len(offline_instances))
                    }
