          - name: getPostPatchDetails
            action: aws:executeScript
            timeoutSeconds: 900
            nextStep: disableAdminMaintenance
            isCritical: false
            isEnd: false
            onFailure: Continue
            inputs:
              Script: |-
                def script_handler(events, context):
                    import boto3, json, time
                    
                    s3 = boto3.client('s3')
                    ssm = boto3.client('ssm')
                    state_bucket = events['stateBucket']
                    state_prefix = f"maintenance-state/{events['directoryId']}/{events['executionId']}"
                    
                    obj = s3.get_object(Bucket=state_bucket, Key=f"{state_prefix}/managed-instances.json")
                    instance_ids = json.loads(obj['Body'].read().decode('utf-8'))['instanceIds']
                    
                    # Batch-fetch all instance info (100 per call limit)
                    instance_map = {}
                    for i in range(0, len(instance_ids), 100):
                        batch = instance_ids[i:i + 100]
                        resp = ssm.describe_instance_information(
                            InstanceInformationFilterList=[{'key': 'InstanceIds', 'valueSet': batch}]
                        )
                        for inst in resp['InstanceInformationList']:
                            instance_map[inst['InstanceId']] = {
                                'os': f"{inst.get('PlatformName', 'Unknown')} {inst.get('PlatformVersion', '')}".strip(),
                                'platform': inst.get('PlatformType', 'Unknown').lower()
                            }
                    
                    # Group instances by platform
                    windows_ids = [iid for iid in instance_ids if instance_map.get(iid, {}).get('platform') == 'windows']
                    linux_ids = [iid for iid in instance_ids if instance_map.get(iid, {}).get('platform') == 'linux']
                    
                    WIN_SCRIPT = 'try { $u = Get-HotFix | Sort-Object InstalledOn -Descending | Select-Object -First 1; if ($u) { $d = if ($u.InstalledOn) { $u.InstalledOn.ToString("yyyy-MM-dd HH:mm:ss") } else { "Unknown" }; Write-Output "KB:$($u.HotFixID)|Date:$d" } else { Write-Output "KB:None|Date:Unknown" } } catch { Write-Output "KB:Error|Date:Unknown" }'
                    LINUX_SCRIPT = '#!/bin/bash\nif command -v rpm &>/dev/null; then rpm -qa --last 2>/dev/null | head -1 | awk \'{print "Package:"$1"|Date:"$2" "$3" "$4}\'; elif [ -f /var/log/dpkg.log ]; then tail -1 /var/log/dpkg.log | awk \'{print "Package:"$4"|Date:"$1" "$2}\'; else echo "Package:Unknown|Date:Unknown"; fi'
                    
                    # Send bulk commands per platform (50 per send_command call)
                    command_ids = []
                    
                    def send_bulk(ids, doc_name, script):
                        cids = []
                        for i in range(0, len(ids), 50):
                            batch = ids[i:i + 50]
                            resp = ssm.send_command(
                                InstanceIds=batch, DocumentName=doc_name,
                                Parameters={'commands': [script]}, TimeoutSeconds=60
                            )
                            cids.append(resp['Command']['CommandId'])
                        return cids
                    
                    if windows_ids:
                        command_ids.extend(send_bulk(windows_ids, 'AWS-RunPowerShellScript', WIN_SCRIPT))
                    if linux_ids:
                        command_ids.extend(send_bulk(linux_ids, 'AWS-RunShellScript', LINUX_SCRIPT))
                    
                    # Wait for all commands to complete
                    if command_ids:
                        time.sleep(30)
                        for _ in range(12):
                            all_done = True
                            for cid in command_ids:
                                resp = ssm.list_commands(CommandId=cid)
                                if resp['Commands'] and resp['Commands'][0]['Status'] in ['Pending', 'InProgress']:
                                    all_done = False
                                    break
                            if all_done:
                                break
                            time.sleep(10)
                    
                    # Collect results
                    post_patch_details = []
                    for cid in command_ids:
                        paginator = ssm.get_paginator('list_command_invocations')
                        for page in paginator.paginate(CommandId=cid, Details=True):
                            for inv in page['CommandInvocations']:
                                iid = inv['InstanceId']
                                info = instance_map.get(iid, {'os': 'Unknown', 'platform': 'unknown'})
                                output = ''
                                for plugin in inv.get('CommandPlugins', []):
                                    output = plugin.get('Output', '').strip()
                                
                                latest = 'No update information available'
                                if inv['Status'] == 'Success' and output:
                                    parts = {p.split(':',1)[0]: p.split(':',1)[1] for p in output.split('|') if ':' in p}
                                    name = parts.get('KB') or parts.get('Package') or ''
                                    date = parts.get('Date', '')
                                    if name:
                                        latest = f"{name} installed on {date}" if date else name
                                
                                post_patch_details.append(f"Instance {iid}:\nOperating System: {info['os']}\nLatest Update: {latest}")
                    
                    # Add any instances we couldn't reach
                    reported = {d.split('\n')[0].split(' ')[1].rstrip(':') for d in post_patch_details}
                    for iid in instance_ids:
                        if iid not in reported:
                            info = instance_map.get(iid, {'os': 'Unknown'})
                            post_patch_details.append(f"Instance {iid}:\nOperating System: {info.get('os','Unknown')}\nLatest Update: No data collected")
                    
                    s3.put_object(
                        Bucket=state_bucket, Key=f"{state_prefix}/post-patch-details.json",
                        Body=json.dumps({'postPatchDetails': post_patch_details}), ServerSideEncryption='AES256'
                    )
                    return {'detailCount': str(len(post_patch_details))}
              Runtime: python3.11
              InputPayload:
                stateBucket: '{{ StateBucket }}'
                directoryId: '{{ getWorkspaces.directoryId }}'
                executionId: '{{ automation:EXECUTION_ID }}'
              Handler: script_handler
            outputs:
              - Type: String
                Name: detailCount
                Selector: $.Payload.detailCount

