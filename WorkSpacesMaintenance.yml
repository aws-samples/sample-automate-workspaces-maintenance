                            while attempt < max_attempts:
                                try:
                                    invocation = ssm.get_command_invocation(
                                        CommandId=command_id,
                                        InstanceId=instance_id
                                    )
                                    
                                    if invocation['Status'] in ['Success', 'Failed', 'Cancelled', 'TimedOut']:
                                        break
                                        
                                except ssm.exceptions.InvocationDoesNotExist:
                                    pass
                                
                                time.sleep(5)
                                attempt += 1
                            
                            # Parse the output based on platform
                            latest_update = "No update information available"
                            if invocation['Status'] == 'Success' and invocation.get('StandardOutputContent'):
                                output = invocation['StandardOutputContent'].strip()
                                
                                if platform_type.lower() == 'windows':
                                    # Parse Windows output
                                    if 'KB:' in output and 'Date:' in output:
                                        parts = output.split('|')
                                        kb_part = next((p for p in parts if p.startswith('KB:')), '')
                                        date_part = next((p for p in parts if p.startswith('Date:')), '')
                                        
                                        if kb_part and date_part:
                                            kb = kb_part.replace('KB:', '')
                                            install_date = date_part.replace('Date:', '')
                                            latest_update = f"{kb} installed on {install_date}"
                                
                                elif platform_type.lower() == 'linux':
                                    # Parse Linux output
                                    if 'Package:' in output and 'Date:' in output:
                                        parts = output.split('|')
                                        package_part = next((p for p in parts if p.startswith('Package:')), '')
                                        date_part = next((p for p in parts if p.startswith('Date:')), '')
                                        
                                        if package_part and date_part:
                                            package = package_part.replace('Package:', '')
                                            install_date = date_part.replace('Date:', '')
                                            latest_update = f"{package} installed on {install_date}"
                            
                            detail = f"Instance {instance_id}:\nOperating System: {os_info}\nLatest Update: {latest_update}"
                            post_patch_details.append(detail)
                            
                        except Exception as e:
                            print(f"Error getting post-patch details for {instance_id}: {str(e)}")
                            detail = f"Instance {instance_id}:\nOperating System: Unknown\nLatest Update: Error retrieving update information"
                            post_patch_details.append(detail)
                    
                    return {
                        'StatusCode': 200,
                        'postPatchDetails': post_patch_details
                    }
              Runtime: python3.11
              InputPayload:
                instanceIds: '{{ getManagedInstances.instanceIds }}'
              Handler: script_handler
            outputs:
              - Type: StringList
                Name: postPatchDetails
                Selector: $.Payload.postPatchDetails

          - name: disableAdminMaintenance
            action: aws:executeScript
            nextStep: branchStopWorkspaces
            isEnd: false
            inputs:
              Script: |-
                def script_handler(events, context):
                    import boto3
                    
                    workspaces = boto3.client('workspaces')
                    workspace_ids = events['matchedWorkspaceIds']
                    
                    for workspace_id in workspace_ids:
                        try:
                            response = workspaces.modify_workspace_state(
                                WorkspaceId=str(workspace_id),
                                WorkspaceState='AVAILABLE'
                            )
                            print(f"Set WorkSpace {workspace_id} to Available")
                            
                        except Exception as e:
                            print(f"Error processing workspace {workspace_id}: {str(e)}")
                    
                    return {'StatusCode': 200, 'Message': 'WorkSpaces set to AVAILABLE state'}
              Runtime: python3.11
              InputPayload:
                matchedWorkspaceIds: '{{ getManagedInstances.matchedWorkspaceIds }}'
              Handler: script_handler

          - name: branchStopWorkspaces
            action: aws:branch
            inputs:
              Choices:
                - NextStep: stopWorkspaces
                  Variable: '{{ StopWorkspaces }}'
                  StringEquals: 'Yes'
              Default: branchSnsNotification

          - name: stopWorkspaces
            action: aws:executeScript
            nextStep: branchSnsNotification
            isEnd: false
            inputs:
              Script: |-
                def script_handler(events, context):
                    import boto3
                    
                    workspaces = boto3.client('workspaces')
                    workspace_ids = events['matchedWorkspaceIds']
                    running_modes = events['workspaceModes']
                    
                    workspaces_to_stop = []
                    for workspace_id, running_mode in zip(workspace_ids, running_modes):
                        if running_mode == 'AUTO_STOP':
                            workspaces_to_stop.append(workspace_id)
                    
                    if not workspaces_to_stop:
                        print("No AUTO_STOP WorkSpaces to stop")
                        return {'StatusCode': 200, 'Message': 'No WorkSpaces needed to be stopped'}
                    
                    batch_size = 25
                    for i in range(0, len(workspaces_to_stop), batch_size):
                        batch = workspaces_to_stop[i:i + batch_size]
                        
                        try:
                            response = workspaces.stop_workspaces(
                                StopWorkspaceRequests=[
                                    {'WorkspaceId': w_id} for w_id in batch
                                ]
                            )
                            
                            if response['FailedRequests']:
                                print(f"Failed requests: {response['FailedRequests']}")
                            else:
                                print(f"Successfully requested stop for WorkSpaces: {batch}")
                            
                        except Exception as e:
                            print(f"Error stopping workspaces batch: {str(e)}")
                    
                    return {
                        'StatusCode': 200,
                        'Message': f'Completed stop requests for {len(workspaces_to_stop)} AUTO_STOP WorkSpaces',
                        'stoppedWorkspaces': workspaces_to_stop
                    }
              Runtime: python3.11
              InputPayload:
                matchedWorkspaceIds: '{{ getManagedInstances.matchedWorkspaceIds }}'
                workspaceModes: '{{ getWorkspaces.workspaceModes }}'
              Handler: script_handler
            outputs:
              - Type: StringList
                Name: stoppedWorkspaces
                Selector: $.Payload.stoppedWorkspaces

          - name: branchSnsNotification
            action: aws:branch
            isEnd: true
            inputs:
              Choices:
                - NextStep: sendSummary
                  Variable: '{{ SnsTopicArn }}'
                  Contains: arn

          - name: sendSummary
            action: aws:executeScript
            nextStep: branchComplianceReport
            inputs:
              Script: |-
                def script_handler(events, context):
                    import boto3
                    
                    sns = boto3.client('sns')
                    
                    message = f"WorkSpaces Patching Summary\n"
                    message += f"===========================\n\n"

                    message += f"Initial Discovery:\n"
                    message += f"------------------\n"
                    message += f"Found {events['workspaceCount']} WorkSpace(s) eligible for patching\n"
                    message += f"{events['excludedCount']} WorkSpace(s) excluded from patching due to tags"
                    if events['excludedWorkspaces']:
                        message += f":\n{', '.join(events['excludedWorkspaces'])}"

                    message += f"\n\nSystems Manager Status:\n"
                    message += f"-----------------------\n"
                    message += f"Found {events['unmanagedCount']} WorkSpace(s) not managed by Systems Manager"
                    if events['unmanagedWorkspaceIds']:
                        message += f":\n{', '.join(events['unmanagedWorkspaceIds'])}"
                    
                    message += f"\n\nTotal WorkSpaces to be patched: {events['matchedWorkspacesCount']}"
                    
                    message += f"\n\nSSM Ping Status Before Patching:\n"
                    message += f"--------------------------------\n"
                    message += f"Online instances: {events['onlineCount']}\n"
                    message += f"Offline instances: {events['offlineCount']}"
                    if events['offlineInstances']:
                      message += "\nOffline instance details:\n"
                      for instance in events['offlineInstances']:
                        message += f"- {instance}\n"
                      
                    message += f"\nPatch Execution Details:\n"
                    message += f"------------------------\n"
                    # Handle command ID - extract the actual command ID from whichever step ran
                    import re
                    
                    command_id_byol = events.get('commandIdBYOL', '')
                    command_id_instances = events.get('commandIdInstances', '')
                    
                    # Clean up any unresolved template variables and extract valid command IDs
                    def extract_command_id(raw_id):
                        if not raw_id:
                            return ''
                        # Simple extraction - just return the raw_id if it looks like a command ID
                        if len(raw_id) > 30 and '-' in raw_id:
                            return raw_id
                        return ''
                    
                    command_id = extract_command_id(command_id_byol) or extract_command_id(command_id_instances)
                    message += f"Systems Manager Run Command ID: {command_id}\n"
                    message += f"Successfully patched: {events['successCount']} WorkSpaces\n"
                    message += f"Failed to patch: {events['failedCount']} WorkSpaces\n"
                    
                    message += f"\nDetailed Patch Status:\n"
                    message += f"----------------------\n"
                    for status in events['finalStatus']:
                      message += f"{status}\n"
                    
                    # Add driver update information
                    if events.get('updateDrivers') == 'Yes':
                        message += f"\nAWS Driver Updates:\n"
                        message += f"-------------------\n"
                        message += f"Driver updates were enabled during maintenance.\n"
                        message += f"NVMe and ENA drivers updated for all WorkSpaces\n"
                    else:
                        message += f"\nAWS Driver Updates: Disabled\n"
                    
                    # Add post-patch details
                    message += f"\nPost-Patch Details:\n"
                    message += f"-------------------\n"
                    if events.get('postPatchDetails'):
                        for detail in events['postPatchDetails']:
                            message += f"{detail}\n\n"
                    else:
                        message += "Post-patch details not available\n"
                      
                    try:
                        response = sns.publish(
                            TopicArn=events['snsTopicArn'],
                            Subject='WorkSpaces Patching Automation Summary',
                            Message=message
                        )
                        print("SNS notification sent successfully")
                        
                    except Exception as e:
                        print(f"Error sending SNS notification: {str(e)}")
                        raise
                    
                    return {
                        'StatusCode': 200,
                        'Message': 'SNS notification sent'
                    }
              Runtime: python3.11
              InputPayload:
                unmanagedCount: '{{ getManagedInstances.unmanagedCount }}'
                matchedWorkspacesCount: '{{ getManagedInstances.matchedWorkspacesCount }}'
                onlineCount: '{{ monitorPingStatus.onlineCount }}'
                offlineCount: '{{ monitorPingStatus.offlineCount }}'
                offlineInstances: '{{ monitorPingStatus.offlineInstances }}'
                finalStatus: '{{ recordPatchResults.finalStatus }}'
                commandIdBYOL: '{{ patchBYOL.commandId }}'
                commandIdInstances: '{{ patchInstances.commandId }}'
                failedCount: '{{ recordPatchResults.failedCount }}'
                snsTopicArn: '{{ SnsTopicArn }}'
                unmanagedWorkspaceIds: '{{ getManagedInstances.unmanagedWorkspaceIds }}'
                workspaceCount: '{{ getWorkspaces.workspaceCount }}'
                successCount: '{{ recordPatchResults.successCount }}'
                excludedCount: '{{ getWorkspaces.excludedCount }}'
                excludedWorkspaces: '{{ getWorkspaces.excludedWorkspaces }}'
                postPatchDetails: '{{ getPostPatchDetails.postPatchDetails }}'
                updateDrivers: '{{ UpdateAWSDrivers }}'
                directoryTenancy: '{{ getDirectoryTenancy.Tenancy }}'
              Handler: script_handler

          - name: branchComplianceReport
            action: aws:branch
            isEnd: true
            inputs:
              Choices:
                - NextStep: generateComplianceReport
                  Variable: '{{ GenerateComplianceReport }}'
                  StringEquals: 'Yes'

          - name: generateComplianceReport
            action: aws:invokeLambdaFunction
            isEnd: true
            inputs:
              FunctionName: !If 
                - GenerateReport
                - !Ref ComplianceReportLambda
                - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:dummy'
              Payload: |
                {
                  "PatchGroup": "WorkSpaces-{{ getWorkspaces.directoryId }}",
                  "DirectoryId": "{{ getWorkspaces.directoryId }}"
                }

  WorkSpacesMaintenanceWindowTask:
    Type: AWS::SSM::MaintenanceWindowTask
    DependsOn: WorkSpacesMaintenanceRole
    Properties:
      WindowId: !Ref WorkSpacesMaintenanceWindow
      Name: !Sub 'WorkSpacesMaintenance-${DirectoryId}-Task'
      TaskType: AUTOMATION
      TaskArn: !Ref WorkspacePatchingDocument
      ServiceRoleArn: !GetAtt WorkSpacesMaintenanceRole.Arn
      Priority: 1
      TaskParameters:
        AutomationAssumeRole:
          Values:
            - !GetAtt WorkSpacesMaintenanceRole.Arn
        CloudWatchLogGroupName:
          Values:
            - !Sub '${CloudWatchLogGroupName}/${DirectoryId}'
        StopWorkspaces:
          Values:
            - 'Yes'
        Action:
          Values:
            - 'Install'
        SnsTopicArn:
          Values:
            - !If 
              - CreateNewSnsTopic
              - !Ref WorkSpacesPatchingTopic
              - !Ref SnsTopicArn
        AllowReboot:
          Values:
            - 'RebootIfNeeded'
        ExcludeKBs:
          Values:
            - 'KB5007651'
        GenerateComplianceReport:
          Values:
            - !Ref GenerateComplianceReport
        UpdateAWSDrivers:
          Values:
            - !Ref UpdateAWSDrivers

Outputs:
  AutomationDocumentArn:
    Description: ARN of the created SSM Automation document
    Value: !Ref WorkspacePatchingDocument
  WorkSpacesMaintenanceRoleArn:
    Description: ARN of the created WorkSpacesMaintenance IAM role
    Value: !GetAtt WorkSpacesMaintenanceRole.Arn
  MaintenanceWindowId:
    Description: ID of the created Maintenance Window
    Value: !Ref WorkSpacesMaintenanceWindow
  WindowsPatchBaselineId:
    Description: ID of the created Windows Patch Baseline for WorkSpaces
    Value: !Ref WorkSpacesPatchBaseline
    Condition: CreatePatchBaselines
  RockyLinuxPatchBaselineId:
    Description: ID of the created Rocky Linux Patch Baseline for WorkSpaces
    Value: !Ref WorkSpacesRockyLinuxPatchBaseline
    Condition: CreatePatchBaselines
  AmazonLinux2PatchBaselineId:
    Description: ID of the created Amazon Linux 2 Patch Baseline for WorkSpaces
    Value: !Ref WorkSpacesAmazonLinux2PatchBaseline
    Condition: CreatePatchBaselines
  UbuntuPatchBaselineId:
    Description: ID of the created Ubuntu Patch Baseline for WorkSpaces
    Value: !Ref WorkSpacesUbuntuPatchBaseline
    Condition: CreatePatchBaselines
  RedHatPatchBaselineId:
    Description: ID of the created Red Hat Enterprise Linux Patch Baseline for WorkSpaces
    Value: !Ref WorkSpacesRedHatPatchBaseline
    Condition: CreatePatchBaselines
  NotificationTopicArn:
    Description: ARN of the SNS Topic used for notifications
    Value: !If 
      - CreateNewSnsTopic
      - !Ref WorkSpacesPatchingTopic
      - !Ref SnsTopicArn
  DirectoryIdentifier:
    Description: Directory ID associated with this maintenance configuration
    Value: !Ref DirectoryId
  ComplianceReportBucketName:
    Description: Name of the S3 bucket for compliance reports (if created)
    Value: !If 
      - CreateReportBucket
      - !Ref ComplianceReportS3Bucket
      - !Ref ComplianceReportBucket
    Condition: GenerateReport
