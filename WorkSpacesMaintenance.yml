                      def script_handler(events, context):
                          import boto3, json, time
                          
                          s3 = boto3.client('s3')
                          ssm = boto3.client('ssm')
                          state_bucket = events['stateBucket']
                          state_prefix = f"maintenance-state/{events['directoryId']}/{events['executionId']}"
                          
                          obj = s3.get_object(Bucket=state_bucket, Key=f"{state_prefix}/patch-command-ids.json")
                          command_ids = json.loads(obj['Body'].read().decode('utf-8'))['commandIds']
                          
                          all_completed = True
                          total_success = 0
                          total_failed = 0
                          status_list = []
                          
                          for command_id in command_ids:
                              try:
                                  cmd_resp = ssm.list_commands(CommandId=command_id)
                                  if not cmd_resp['Commands']:
                                      status_list.append(f"Command {command_id}: NotFound")
                                      continue
                                  
                                  cmd_status = cmd_resp['Commands'][0]['Status']
                                  if cmd_status in ['Pending', 'InProgress']:
                                      all_completed = False
                                  
                                  paginator = ssm.get_paginator('list_command_invocations')
                                  for page in paginator.paginate(CommandId=command_id, Details=False):
                                      for inv in page['CommandInvocations']:
                                          status = inv['Status']
                                          if status == 'Success':
                                              total_success += 1
                                          elif status in ['Failed', 'Cancelled', 'TimedOut']:
                                              total_failed += 1
                                          status_list.append(f"Instance {inv['InstanceId']}: {status}")
                              except Exception as e:
                                  print(f"Error checking command {command_id}: {str(e)}")
                                  all_completed = False
                          
                          # Store detailed status in S3 (can be large)
                          s3.put_object(
                              Bucket=state_bucket, Key=f"{state_prefix}/patch-status-detail.json",
                              Body=json.dumps({'finalStatus': status_list}), ServerSideEncryption='AES256'
                          )
                          
                          print(f"Completed: {all_completed}, Success: {total_success}, Failed: {total_failed}")
                          
                          if not all_completed:
                              print("Waiting 5 min before next check...")
                              time.sleep(300)
                          
                          return {
                              'completed': all_completed,
                              'successCount': str(total_success),
                              'failedCount': str(total_failed)
                          }
