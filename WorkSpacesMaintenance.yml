AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create Automated WorkSpaces Maintenance and Patching'

Parameters:
  DirectoryId:
    Type: String
    Description: 'The Directory ID associated with the WorkSpaces'
    AllowedPattern: "^d-[0-9a-f]{10}$"
    ConstraintDescription: "Must be a valid Directory ID in the format d-XXXXXXXXXX"
  SnsTopicArn:
    Type: String
    Description: (Optional) SNS Topic ARN for notifications. If not provided, a new topic will be created.
    Default: ''
  MaintenanceSchedule:
    Type: String
    Default: 'cron(0 3 ? * SUN *)'
    Description: Schedule expression for the maintenance window
  MaintenanceWindowDuration:
    Type: Number
    Default: 3
    Description: Duration of maintenance window in hours
    MinValue: 1
    MaxValue: 24
  NotificationEmails:
    Type: CommaDelimitedList
    Description: (Optional) Comma-separated list of email addresses to subscribe to the SNS topic notifications
    Default: ''
  GenerateComplianceReport:
    Type: String
    Default: 'Yes'
    AllowedValues: ['Yes', 'No']
    Description: Generate patch compliance report after maintenance
  ComplianceReportBucket:
    Type: String
    Description: (Optional) S3 bucket name for storing compliance reports. If empty, a new bucket will be created.
    Default: ''
  ComplianceReportPrefix:
    Type: String
    Default: 'patch-compliance-reports'
    Description: S3 prefix for organizing compliance reports
  UpdateAWSDrivers:
    Type: String
    Default: 'Yes'
    AllowedValues: ['Yes', 'No']
    Description: Whether to update AWS drivers (NVMe, ENA) during maintenance.
  CloudWatchLogGroupName:
    Type: String
    Default: '/aws/workspaces/maintenance'
    Description: CloudWatch Log Group name for streaming patching operation logs. If empty, a new log group will be created with the default name.
  CreatePatchGroups:
    Type: String
    Default: 'Yes'
    AllowedValues: ['Yes', 'No']
    Description: Whether to create patch baselines and associate patch groups. If No, uses default patch baselines.

Conditions:
  CreateNewSnsTopic: !Equals 
    - !Ref SnsTopicArn
    - ''
  SubscribeEmail: !And
    - !Condition CreateNewSnsTopic
    - !Not [!Equals [!Join ['', !Ref NotificationEmails], '']]
  GenerateReport: !Equals [!Ref GenerateComplianceReport, 'Yes']
  CreateReportBucket: !And
    - !Condition GenerateReport
    - !Equals [!Ref ComplianceReportBucket, '']
  CreateLogGroup: !Equals [!Ref CloudWatchLogGroupName, '/aws/workspaces/maintenance']
  CreatePatchBaselines: !Equals [!Ref CreatePatchGroups, 'Yes']

Resources:
  WorkSpacesMaintenanceLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: CreateLogGroup
    Properties:
      LogGroupName: !Sub '${CloudWatchLogGroupName}/${DirectoryId}'
      RetentionInDays: 60
      Tags:
        - Key: Purpose
          Value: WorkSpaces Maintenance Logging
        - Key: DirectoryId
          Value: !Ref DirectoryId

  WorkSpacesPatchingTopic:
    Type: AWS::SNS::Topic
    Condition: CreateNewSnsTopic
    Properties:
      TopicName: !Sub 'WorkSpacesMaintenance-${DirectoryId}-Topic'
      KmsMasterKeyId: alias/aws/sns
      Tags:
        - Key: Purpose
          Value: WorkSpaces Patching Notifications
        - Key: DirectoryId
          Value: !Ref DirectoryId

  WorkSpacesPatchingTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Condition: CreateNewSnsTopic
    Properties:
      Topics:
        - !Ref WorkSpacesPatchingTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSSMPublish
            Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sns:Publish
            Resource: !Ref WorkSpacesPatchingTopic

  EmailSubscriptions:
    Type: AWS::CloudFormation::CustomResource
    Condition: SubscribeEmail
    Properties:
      ServiceToken: !GetAtt EmailSubscriptionLambda.Arn
      TopicArn: !Ref WorkSpacesPatchingTopic
      EmailAddresses: !Ref NotificationEmails

  EmailSubscriptionLambda:
    Type: AWS::Lambda::Function
    Condition: SubscribeEmail
    Properties:
      FunctionName: !Sub 'workspacemaintenance-emailsubscription-${DirectoryId}'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt EmailSubscriptionLambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import json
          import cfnresponse
          
          def lambda_handler(event, context):
              try:
                  sns = boto3.client('sns')
                  
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      topic_arn = event['ResourceProperties']['TopicArn']
                      email_addresses = event['ResourceProperties']['EmailAddresses']
                      
                      # Filter out empty strings
                      emails = [email.strip() for email in email_addresses if email.strip()]
                      
                      subscription_arns = []
                      for email in emails:
                          response = sns.subscribe(
                              TopicArn=topic_arn,
                              Protocol='email',
                              Endpoint=email
                          )
                          subscription_arns.append(response['SubscriptionArn'])
                      
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                          'SubscriptionArns': subscription_arns,
                          'EmailCount': len(emails)
                      })
                  
                  elif event['RequestType'] == 'Delete':
                      # SNS subscriptions are automatically cleaned up when the topic is deleted
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

  EmailSubscriptionLambdaRole:
    Type: AWS::IAM::Role
    Condition: SubscribeEmail
    Properties:
      RoleName: !Sub 'workspacemaintenance-emailsubscription-${DirectoryId}-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SNSSubscriptionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Subscribe
                  - sns:Unsubscribe
                  - sns:ListSubscriptionsByTopic
                Resource: !Ref WorkSpacesPatchingTopic

  MaintenanceStateBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteStateFiles
            Status: Enabled
            Prefix: maintenance-state/
            ExpirationInDays: 30
      Tags:
        - Key: Purpose
          Value: WorkSpaces Maintenance State
        - Key: DirectoryId
          Value: !Ref DirectoryId

  MaintenanceStateBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MaintenanceStateBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyUnencryptedTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:aws:s3:::${MaintenanceStateBucket}'
              - !Sub 'arn:aws:s3:::${MaintenanceStateBucket}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  ComplianceReportS3Bucket:
    Type: AWS::S3::Bucket
    Condition: CreateReportBucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldReports
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Purpose
          Value: Patch Compliance Reports
        - Key: DirectoryId
          Value: !Ref DirectoryId
        - Key: Name
          Value: !Sub '${AWS::StackName}-compliance-reports'

  ComplianceReportS3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: CreateReportBucket
    Properties:
      Bucket: !Ref ComplianceReportS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyUnencryptedTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:aws:s3:::${ComplianceReportS3Bucket}'
              - !Sub 'arn:aws:s3:::${ComplianceReportS3Bucket}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  ComplianceReportLambdaRole:
    Type: AWS::IAM::Role
    Condition: GenerateReport
    Properties:
      RoleName: !Sub 'workspacemaintenance-compliancereport-${DirectoryId}-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ComplianceReportPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:DescribeInstanceInformation
                  - ssm:ListComplianceItems
                  - ssm:ListTagsForResource
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                  - s3:GetObject
                Resource: 
                  - !If 
                    - CreateReportBucket
                    - !Sub 'arn:aws:s3:::${ComplianceReportS3Bucket}/*'
                    - !Sub 'arn:aws:s3:::${ComplianceReportBucket}/*'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !If 
                  - CreateNewSnsTopic
                  - !Ref WorkSpacesPatchingTopic
                  - !Ref SnsTopicArn

  ComplianceReportLambda:
    Type: AWS::Lambda::Function
    Condition: GenerateReport
    Properties:
      FunctionName: !Sub 'workspacemaintenance-compliancereport-${DirectoryId}'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt ComplianceReportLambdaRole.Arn
      Timeout: 900  # 15 minutes
      MemorySize: 1024
      Environment:
        Variables:
          BUCKET_NAME: !If 
            - CreateReportBucket
            - !Ref ComplianceReportS3Bucket
            - !Ref ComplianceReportBucket
          BUCKET_PREFIX: !Ref ComplianceReportPrefix
          SNS_TOPIC_ARN: !If 
            - CreateNewSnsTopic
            - !Ref WorkSpacesPatchingTopic
            - !Ref SnsTopicArn
      Code:
        ZipFile: |
          import boto3
          import csv
          import json
          import os
          from datetime import datetime
          from collections import Counter
          import io
          
          def lambda_handler(event, context):
              try:
                  patch_group = event.get('PatchGroup', '')
                  directory_id = event.get('DirectoryId', '')
                  
                  ssm = boto3.client('ssm')
                  s3 = boto3.client('s3')
                  sns = boto3.client('sns')
                  
                  bucket_name = os.environ['BUCKET_NAME']
                  bucket_prefix = os.environ['BUCKET_PREFIX']
                  sns_topic_arn = os.environ['SNS_TOPIC_ARN']
                  
                  print(f"Generating compliance report for patch group: {patch_group}")
                  
                  # Get all managed instances (batched)
                  instance_map = {}
                  paginator = ssm.get_paginator('describe_instance_information')
                  for page in paginator.paginate():
                      for inst in page['InstanceInformationList']:
                          instance_map[inst['InstanceId']] = {
                              'ComputerName': inst.get('ComputerName', 'Unknown'),
                              'PingStatus': inst.get('PingStatus', 'Unknown'),
                              'LastPingDateTime': str(inst.get('LastPingDateTime', 'Unknown'))
                          }
                  
                  target_instances = list(instance_map.keys())
                  if not target_instances:
                      raise Exception("No instances found for compliance reporting")
                  
                  print(f"Found {len(target_instances)} managed instances")
                  
                  # Generate compliance data - batch by 20 instances per API call
                  compliance_data = []
                  batch_size = 20
                  for i in range(0, len(target_instances), batch_size):
                      batch = target_instances[i:i + batch_size]
                      for instance_id in batch:
                          try:
                              paginator_c = ssm.get_paginator('list_compliance_items')
                              for page in paginator_c.paginate(
                                  ResourceIds=[instance_id],
                                  ResourceTypes=['ManagedInstance'],
                                  Filters=[{'Key': 'ComplianceType', 'Values': ['Patch'], 'Type': 'EQUAL'}]
                              ):
                                  for item in page['ComplianceItems']:
                                      if item['Status'] in ['COMPLIANT', 'NON_COMPLIANT']:
                                          info = instance_map.get(instance_id, {})
                                          compliance_data.append({
                                              'InstanceId': instance_id,
                                              'ComputerName': info.get('ComputerName', 'Unknown'),
                                              'PingStatus': info.get('PingStatus', 'Unknown'),
                                              'LastPingDateTime': info.get('LastPingDateTime', 'Unknown'),
                                              'PatchName': item.get('Title', 'Unknown'),
                                              'KBId': item.get('Id', 'Unknown'),
                                              'Severity': item.get('Severity', 'Unknown'),
                                              'State': item['Status'],
                                              'ComplianceType': item['ComplianceType'],
                                              'LastScanTime': str(item.get('ExecutionSummary', {}).get('ExecutionTime', 'Unknown')),
                                              'Classification': item.get('Details', {}).get('Classification', 'Unknown'),
                                              'InstalledTime': item.get('Details', {}).get('InstalledTime', 'N/A'),
                                              'PatchGroup': patch_group
                                          })
                          except Exception as e:
                              print(f"Error processing instance {instance_id}: {str(e)}")
                              continue
                  
                  if not compliance_data:
                      raise Exception("No compliance data generated")
                  
                  # Create CSV
                  output = io.StringIO()
                  writer = csv.DictWriter(output, fieldnames=compliance_data[0].keys())
                  writer.writeheader()
                  writer.writerows(compliance_data)
                  csv_content = output.getvalue()
                  
                  # Upload to S3
                  timestamp = datetime.now().strftime("%Y-%m-%dT%H%M")
                  filename = f"ComplianceReport_{patch_group or directory_id}_{timestamp}.csv"
                  s3_key = f"{bucket_prefix}/{filename}"
                  
                  s3.put_object(Bucket=bucket_name, Key=s3_key, Body=csv_content,
                                ContentType='text/csv', ServerSideEncryption='AES256')
                  
                  s3_console_url = f"https://s3.console.aws.amazon.com/s3/object/{bucket_name}?prefix={s3_key}"
                  
                  # Statistics
                  total = len(compliance_data)
                  compliant = sum(1 for p in compliance_data if p['State'] == 'COMPLIANT')
                  non_compliant = total - compliant
                  rate = round((compliant / total) * 100, 2) if total > 0 else 0
                  severity_counts = dict(Counter(p['Severity'] for p in compliance_data if p['State'] == 'NON_COMPLIANT'))
                  
                  stats = {'total_patches': total, 'compliant_patches': compliant,
                           'non_compliant_patches': non_compliant, 'compliance_percentage': rate,
                           'severity_breakdown': severity_counts}
                  
                  # SNS notification
                  message = f'''Patch Compliance Report Generated
          =====================================
          
          Report Details:
          - Filename: {filename}
          - Patch Group: {patch_group or 'All Instances'}
          - Generated: {datetime.now().strftime('%Y-%m-%d %H:%M:%S UTC')}
          
          Compliance Summary:
          - Total Patches: {total}
          - Compliant: {compliant}
          - Non-Compliant: {non_compliant}
          - Compliance Rate: {rate}%
          
          Severity Breakdown (Non-Compliant):
          {chr(10).join([f'- {k}: {v}' for k, v in severity_counts.items()])}
          
          Download from S3 console:
          {s3_console_url}
          
          Or use the AWS CLI:
          aws s3 cp s3://{bucket_name}/{s3_key} .
          '''
                  
                  sns.publish(TopicArn=sns_topic_arn,
                              Subject=f'Patch Compliance Report: {patch_group or "All Instances"}',
                              Message=message)
                  
                  return {'statusCode': 200, 'body': {'message': 'Compliance report generated successfully',
                          'filename': filename, 's3_location': f"s3://{bucket_name}/{s3_key}",
                          'statistics': stats}}
                  
              except Exception as e:
                  print(f"Error generating compliance report: {str(e)}")
                  return {'statusCode': 500, 'body': {'error': str(e)}}
      Tags:
        - Key: DirectoryId
          Value: !Ref DirectoryId

  WorkSpacesPatchBaseline:
    Type: AWS::SSM::PatchBaseline
    Condition: CreatePatchBaselines
    Properties:
      Name: !Sub 'WorkSpaces-PatchBaseline-Windows-${DirectoryId}'
      Description: !Sub 'Windows patch baseline for WorkSpaces in Directory ${DirectoryId} - All Windows products with immediate approval'
      OperatingSystem: WINDOWS
      PatchGroups:
        - !Sub 'WorkSpaces-${DirectoryId}'
        - !Sub 'WorkSpaces-Windows-${DirectoryId}'
      ApprovalRules:
        PatchRules:
          - PatchFilterGroup:
              PatchFilters:
                - Key: PRODUCT
                  Values:
                    - "*"
                - Key: CLASSIFICATION
                  Values:
                    - SecurityUpdates
                    - CriticalUpdates
                    - UpdateRollups
                    - DefinitionUpdates
                    - Updates
                - Key: MSRC_SEVERITY
                  Values:
                    - "*"
            ApproveAfterDays: 0
            ComplianceLevel: MEDIUM
      ApprovedPatches: []
      RejectedPatches:
        - KB5007651
      RejectedPatchesAction: BLOCK
      Tags:
        - Key: DirectoryId
          Value: !Ref DirectoryId
        - Key: Purpose
          Value: WorkSpaces Patching
        - Key: OperatingSystem
          Value: Windows
        - Key: Name
          Value: !Sub 'WorkSpaces-PatchBaseline-Windows-${DirectoryId}'

  WorkSpacesRockyLinuxPatchBaseline:
    Type: AWS::SSM::PatchBaseline
    Condition: CreatePatchBaselines
    Properties:
      Name: !Sub 'WorkSpaces-PatchBaseline-RockyLinux-${DirectoryId}'
      Description: !Sub 'Rocky Linux patch baseline for WorkSpaces in Directory ${DirectoryId} - All products and classifications with immediate approval'
      OperatingSystem: ROCKY_LINUX
      PatchGroups:
        - !Sub 'WorkSpaces-${DirectoryId}'
        - !Sub 'WorkSpaces-RockyLinux-${DirectoryId}'
      ApprovalRules:
        PatchRules:
          - PatchFilterGroup:
              PatchFilters:
                - Key: PRODUCT
                  Values:
                    - "*"
                - Key: CLASSIFICATION
                  Values:
                    - "*"
                - Key: SEVERITY
                  Values:
                    - "*"
            ApproveAfterDays: 0
            ComplianceLevel: MEDIUM
      ApprovedPatches: []
      RejectedPatches: []
      Tags:
        - Key: DirectoryId
          Value: !Ref DirectoryId
        - Key: Purpose
          Value: WorkSpaces Patching
        - Key: OperatingSystem
          Value: RockyLinux
        - Key: Name
          Value: !Sub 'WorkSpaces-PatchBaseline-RockyLinux-${DirectoryId}'

  WorkSpacesAmazonLinux2PatchBaseline:
    Type: AWS::SSM::PatchBaseline
    Condition: CreatePatchBaselines
    Properties:
      Name: !Sub 'WorkSpaces-PatchBaseline-AmazonLinux2-${DirectoryId}'
      Description: !Sub 'Amazon Linux 2 patch baseline for WorkSpaces in Directory ${DirectoryId} - All products and classifications with immediate approval'
      OperatingSystem: AMAZON_LINUX_2
      PatchGroups:
        - !Sub 'WorkSpaces-${DirectoryId}'
        - !Sub 'WorkSpaces-AmazonLinux2-${DirectoryId}'
      ApprovalRules:
        PatchRules:
          - PatchFilterGroup:
              PatchFilters:
                - Key: PRODUCT
                  Values:
                    - "*"
                - Key: CLASSIFICATION
                  Values:
                    - "*"
                - Key: SEVERITY
                  Values:
                    - "*"
            ApproveAfterDays: 0
            ComplianceLevel: MEDIUM
      ApprovedPatches: []
      RejectedPatches: []
      Tags:
        - Key: DirectoryId
          Value: !Ref DirectoryId
        - Key: Purpose
          Value: WorkSpaces Patching
        - Key: OperatingSystem
          Value: AmazonLinux2
        - Key: Name
          Value: !Sub 'WorkSpaces-PatchBaseline-AmazonLinux2-${DirectoryId}'

  WorkSpacesUbuntuPatchBaseline:
    Type: AWS::SSM::PatchBaseline
    Condition: CreatePatchBaselines
    Properties:
      Name: !Sub 'WorkSpaces-PatchBaseline-Ubuntu-${DirectoryId}'
      Description: !Sub 'Ubuntu patch baseline for WorkSpaces in Directory ${DirectoryId} - All products and classifications with immediate approval'
      OperatingSystem: UBUNTU
      PatchGroups:
        - !Sub 'WorkSpaces-${DirectoryId}'
        - !Sub 'WorkSpaces-Ubuntu-${DirectoryId}'
      ApprovalRules:
        PatchRules:
          - PatchFilterGroup:
              PatchFilters:
                - Key: PRODUCT
                  Values:
                    - "*"
                - Key: SECTION
                  Values:
                    - "*"
                - Key: PRIORITY
                  Values:
                    - "*"
            ApproveAfterDays: 0
            ComplianceLevel: MEDIUM
      ApprovedPatches: []
      RejectedPatches: []
      Tags:
        - Key: DirectoryId
          Value: !Ref DirectoryId
        - Key: Purpose
          Value: WorkSpaces Patching
        - Key: OperatingSystem
          Value: Ubuntu
        - Key: Name
          Value: !Sub 'WorkSpaces-PatchBaseline-Ubuntu-${DirectoryId}'

  WorkSpacesRedHatPatchBaseline:
    Type: AWS::SSM::PatchBaseline
    Condition: CreatePatchBaselines
    Properties:
      Name: !Sub 'WorkSpaces-PatchBaseline-RedHat-${DirectoryId}'
      Description: !Sub 'Red Hat Enterprise Linux patch baseline for WorkSpaces in Directory ${DirectoryId} - All products and classifications with immediate approval'
      OperatingSystem: REDHAT_ENTERPRISE_LINUX
      PatchGroups:
        - !Sub 'WorkSpaces-${DirectoryId}'
        - !Sub 'WorkSpaces-RedHat-${DirectoryId}'
      ApprovalRules:
        PatchRules:
          - PatchFilterGroup:
              PatchFilters:
                - Key: PRODUCT
                  Values:
                    - "*"
                - Key: CLASSIFICATION
                  Values:
                    - "*"
                - Key: SEVERITY
                  Values:
                    - "*"
            ApproveAfterDays: 0
            ComplianceLevel: MEDIUM
      ApprovedPatches: []
      RejectedPatches: []
      Tags:
        - Key: DirectoryId
          Value: !Ref DirectoryId
        - Key: Purpose
          Value: WorkSpaces Patching
        - Key: OperatingSystem
          Value: RedHat
        - Key: Name
          Value: !Sub 'WorkSpaces-PatchBaseline-RedHat-${DirectoryId}'

  WorkSpacesMaintenanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'WorkSpacesMaintenance-${DirectoryId}-Role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonSSMMaintenanceWindowRole
      Policies:
        - PolicyName: !Sub 'WorkSpacesMaintenance-${DirectoryId}-Policy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - workspaces:DescribeWorkspaces
                  - workspaces:DescribeWorkspaceDirectories
                  - workspaces:DescribeTags
                  - tag:GetResources
                  - workspaces:StartWorkspaces
                  - workspaces:StopWorkspaces
                  - workspaces:RebootWorkspaces
                  - workspaces:ModifyWorkspaceState
                  - ssm:DescribeInstanceInformation
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - ssm:ListCommands
                  - ssm:ListCommandInvocations
                  - sns:Publish
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${MaintenanceStateBucket}/maintenance-state/*'
              - Effect: Allow
                Action: iam:PassRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/WorkSpacesMaintenance-${DirectoryId}-Role'
                Condition:
                  StringEquals:
                    iam:PassedToService: ssm.amazonaws.com
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !If 
                  - GenerateReport
                  - !GetAtt ComplianceReportLambda.Arn
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:dummy'
      Tags:
        - Key: DirectoryId
          Value: !Ref DirectoryId

  WorkSpacesMaintenanceWindow:
    Type: AWS::SSM::MaintenanceWindow
    Properties:
      Name: !Sub 'WorkSpacesMaintenance-${DirectoryId}-Window'
      Schedule: !Ref MaintenanceSchedule
      Duration: !Ref MaintenanceWindowDuration
      AllowUnassociatedTargets: true
      Cutoff: 1
      Tags:
        - Key: DirectoryId
          Value: !Ref DirectoryId
  ENADriverDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Name: !Sub 'WorkSpaces-InstallENADriver-${DirectoryId}'
      Content:
        schemaVersion: '2.2'
        description: 'Installs AWS ENA driver for Windows WorkSpaces'
        parameters:
          executionTimeout:
            type: String
            default: '3600'
            description: 'Execution timeout in seconds'
        mainSteps:
          - action: aws:runPowerShellScript
            name: installENADriver
            inputs:
              timeoutSeconds: '{{ executionTimeout }}'
              runCommand:
                - try {
                - '    Write-Host "Starting AWS ENA driver installation"'
                - '    $region = "{{ global:REGION }}"'
                - '    $s3Endpoint = switch -Regex ($region){'
                - '        "^us-iso-" {"https://s3.$region.c2s.ic.gov"}'
                - '        "^us-isob-" {"https://s3.$region.sc2s.sgov.gov"}'
                - '        "^us-isof-" {"https://s3.$region.csp.hci.ic.gov"}'
                - '        "^eu-isoe-" {"https://s3.$region.cloud.adc-e.uk"}'
                - '        default {"https://s3.amazonaws.com"}'
                - '    }'
                - '    $OSVersion = [System.Environment]::OSVersion.Version'
                - '    $version = $OSVersion.Major.ToString() + "." + $OSVersion.Minor.ToString()'
                - '    $ntoskrnlver = (Get-Item $env:systemroot\system32\ntoskrnl.exe).VersionInfo.ProductVersion'
                - '    $KB3033929 = [System.Version]"6.1.7601.22948"'
                - '    switch -regex ($version) {'
                - '        "6.1" {'
                - '            if ([System.Version]$ntoskrnlver -lt $KB3033929) {'
                - '                $url = "$s3Endpoint/ec2-windows-drivers-downloads/ENA/2.1.4/AwsEnaNetworkDriver.zip"'
                - '                Write-Host "Using ENA driver version 2.1.4 for Windows Server 2008 R2 (no KB3033929)"'
                - '            }'
                - '            else {'
                - '                $url = "$s3Endpoint/ec2-windows-drivers-downloads/ENA/2.2.3/AwsEnaNetworkDriver.zip"'
                - '                Write-Host "Using ENA driver version 2.2.3 for Windows Server 2008 R2 (with KB3033929)"'
                - '            }'
                - '        }'
                - '        "6.2|6.3" {'
                - '            $url = "$s3Endpoint/ec2-windows-drivers-downloads/ENA/x64/2.6.0/AwsEnaNetworkDriver.zip"'
                - '            Write-Host "Using ENA driver version 2.6.0 for Windows Server 2012/2012 R2"'
                - '        }'
                - '        "10.*" {'
                - '            $url = "$s3Endpoint/ec2-windows-drivers-downloads/ENA/Latest/AwsEnaNetworkDriver.zip"'
                - '            Write-Host "Using latest ENA driver for Windows Server 2016/2019/2022/2025"'
                - '        }'
                - '    }'
                - '    [System.Net.ServicePointManager]::SecurityProtocol = ([int][system.net.SecurityProtocolType]::Tls13 -bor [int][system.net.SecurityProtocolType]::Tls12)'
                - '    [System.Net.ServicePointManager]::ServerCertificateValidationCallback = $null'
                - '    $attemptCount = 1'
                - '    $maxAttempts = 5'
                - '    $tempPath = (Resolve-Path ${env:temp}).Path'
                - '    Write-Host "Downloading AWS ENA drivers"'
                - '    $tempFile = "${tempPath}\AwsEnaNetworkDriver.zip"'
                - '    $tempDir = "${tempPath}\AwsEnaNetworkDriver"'
                - '    $wc = New-Object "System.Net.WebClient"'
                - '    $wc.Headers.Add("user-agent", "AWSSupport-UpgradeWindowsAWSDrivers")'
                - '    Do {'
                - '        Write-Host "Downloading AwsEnaNetworkDriver.zip, attempt: $attemptCount/$maxAttempts..."'
                - '        try {'
                - '            $wc.DownloadFile($url, $tempFile)'
                - '            if (Test-Path $tempFile) {'
                - '                Write-Host "Download successful."'
                - '                break'
                - '            }'
                - '        }'
                - '        catch {'
                - '            Write-Host "Download failed: $_. Retrying..."'
                - '        }'
                - '        $attemptCount++'
                - '        Start-Sleep -Seconds ($attemptCount * 2)'
                - '    } While (($attemptCount -le $maxAttempts) -and (-not (Test-Path $tempFile)))'
                - '    if (-not (Test-Path $tempFile)) {'
                - '        throw "Failed to download AwsEnaNetworkDriver.zip after $maxAttempts attempts."'
                - '    }'
                - '    if (Test-Path $tempDir) {'
                - '        Remove-Item -Path $tempDir -Recurse -Force'
                - '    }'
                - '    try {'
                - '        Add-Type -AssemblyName System.IO.Compression.FileSystem -ErrorAction SilentlyContinue'
                - '        [System.IO.Compression.ZipFile]::ExtractToDirectory($tempFile, $tempDir)'
                - '    }'
                - '    catch [System.InvalidOperationException] {'
                - '        New-Item -Path $tempDir -ItemType "directory" -Force | Out-Null'
                - '        ((New-Object -com shell.application).NameSpace($tempDir)).CopyHere(((New-Object -com shell.application).NameSpace($tempFile)).Items())'
                - '    }'
                - '    Write-Host "Running install script"'
                - '    $output = & "${tempDir}\install.ps1" -NoReboot'
                - '    Write-Host $output'
                - '    if ($output -match "successful") {'
                - '        if ($output -match "reboot") {'
                - '            Write-Host "ENA driver installation completed successfully. Reboot required."'
                - '            exit 3010'
                - '        }'
                - '        Write-Host "ENA driver installation completed successfully."'
                - '        exit 0'
                - '    }'
                - '    else {'
                - '        Write-Host "ENA driver installation failed."'
                - '        exit 1'
                - '    }'
                - '}'
                - catch {
                - '    Write-Host "Error during ENA driver installation: $($_.Exception.Message)"'
                - '    exit 255'
                - '}'



  NVMeDriverDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Name: !Sub 'WorkSpaces-InstallNVMeDriver-${DirectoryId}'
      Content:
        schemaVersion: '2.2'
        description: 'Installs AWS NVMe driver for Windows WorkSpaces'
        parameters:
          executionTimeout:
            type: String
            default: '3600'
            description: 'Execution timeout in seconds'
        mainSteps:
          - action: aws:runPowerShellScript
            name: installNVMeDriver
            inputs:
              timeoutSeconds: '{{ executionTimeout }}'
              runCommand:
                - try {
                - '    Write-Host "Starting AWS NVMe driver installation"'
                - '    $region = "{{ global:REGION }}"'
                - '    $s3Endpoint = switch -Regex ($region){'
                - '        "^us-iso-" {"https://s3.$region.c2s.ic.gov"}'
                - '        "^us-isob-" {"https://s3.$region.sc2s.sgov.gov"}'
                - '        "^us-isof-" {"https://s3.$region.csp.hci.ic.gov"}'
                - '        "^eu-isoe-" {"https://s3.$region.cloud.adc-e.uk"}'
                - '        default {"https://s3.amazonaws.com"}'
                - '    }'
                - '    $OSVersion = [System.Environment]::OSVersion.Version'
                - '    $version = $OSVersion.Major.ToString() + "." + $OSVersion.Minor.ToString()'
                - '    switch -regex ($version) {'
                - '        "6.1" {'
                - '            $url = "$s3Endpoint/ec2-windows-drivers-downloads/NVMe/1.3.2/AWSNVMe.zip"'
                - '            Write-Host "Using NVMe driver version 1.3.2 for Windows Server 2008 R2"'
                - '        }'
                - '        "6.2|6.3" {'
                - '            $url = "$s3Endpoint/ec2-windows-drivers-downloads/NVMe/1.5.1/AWSNVMe.zip"'
                - '            Write-Host "Using NVMe driver version 1.5.1 for Windows Server 2012/2012 R2"'
                - '        }'
                - '        "10.*" {'
                - '            $url = "$s3Endpoint/ec2-windows-drivers-downloads/NVMe/Latest/AWSNVMe.zip"'
                - '            Write-Host "Using latest NVMe driver for Windows Server 2016/2019/2022/2025"'
                - '        }'
                - '    }'
                - '    [System.Net.ServicePointManager]::SecurityProtocol = ([int][system.net.SecurityProtocolType]::Tls13 -bor [int][system.net.SecurityProtocolType]::Tls12)'
                - '    [System.Net.ServicePointManager]::ServerCertificateValidationCallback = $null'
                - '    $attemptCount = 1'
                - '    $maxAttempts = 5'
                - '    $tempPath = (Resolve-Path ${env:temp}).Path'
                - '    Write-Host "Downloading AWS NVMe drivers"'
                - '    $tempFile = "${tempPath}\AWSNVMe.zip"'
                - '    $tempDir = "${tempPath}\AWSNVMe"'
                - '    $wc = New-Object "System.Net.WebClient"'
                - '    $wc.Headers.Add("user-agent", "AWSSupport-UpgradeWindowsAWSDrivers")'
                - '    Do {'
                - '        Write-Host "Downloading AWSNVMe.zip, attempt: $attemptCount/$maxAttempts..."'
                - '        try {'
                - '            $wc.DownloadFile($url, $tempFile)'
                - '            if (Test-Path $tempFile) {'
                - '                Write-Host "Download successful."'
                - '                break'
                - '            }'
                - '        }'
                - '        catch {'
                - '            Write-Host "Download failed: $_. Retrying..."'
                - '        }'
                - '        $attemptCount++'
                - '        Start-Sleep -Seconds ($attemptCount * 1)'
                - '    } While (($attemptCount -le $maxAttempts) -and (-not (Test-Path $tempFile)))'
                - '    if (-not (Test-Path $tempFile)) {'
                - '        throw "Failed to download AWSNVMe.zip after $maxAttempts attempts."'
                - '    }'
                - '    if (Test-Path $tempDir) {'
                - '        Remove-Item -Path $tempDir -Recurse -Force'
                - '    }'
                - '    try {'
                - '        Add-Type -AssemblyName System.IO.Compression.FileSystem -ErrorAction SilentlyContinue'
                - '        [System.IO.Compression.ZipFile]::ExtractToDirectory($tempFile, $tempDir)'
                - '    }'
                - '    catch [System.InvalidOperationException] {'
                - '        New-Item -Path $tempDir -ItemType "directory" -Force | Out-Null'
                - '        ((New-Object -com shell.application).NameSpace($tempDir)).CopyHere(((New-Object -com shell.application).NameSpace($tempFile)).Items())'
                - '    }'
                - '    $nvmetoolPath="${env:ProgramData}\Amazon\Tools"'
                - '    if (-Not (Test-Path -Path $nvmetoolPath)) {'
                - '        New-Item -Path $nvmetoolPath -ItemType "directory" -Force | Out-Null'
                - '    }'
                - '    Write-Host "Running install script"'
                - '    $output = & "${tempDir}\install.ps1" -NoReboot'
                - '    Write-Host $output'
                - '    $result = 1'
                - '    if ($output -eq 0 -or $output -eq 3010) {'
                - '        $result = $output'
                - '    } elseif ($global:LASTEXITCODE -eq 0 -or $global:LASTEXITCODE -eq 3010) {'
                - '        $result = $global:LASTEXITCODE'
                - '    }'
                - '    if ($result -eq 0) {'
                - '        $result = 0'
                - '    } elseif ($result -eq 3010) {'
                - '        $result = 3010'
                - '    }'
                - '    $allowedWinVer = $false'
                - '    $osVer = [System.Environment]::OSVersion.Version'
                - '    if ($osVer.Major -eq 6) {'
                - '        $allowedMinor = @(1, 2)'
                - '        if ($allowedMinor -contains $osVer.Minor) {'
                - '            $allowedWinVer = $true'
                - '        }'
                - '    }'
                - '    if ($allowedWinVer) {'
                - '        $allowedInstanceType = $false'
                - '        $ErrorActionPreference = "stop"'
                - '        try {'
                - '            $systemVersion = (Get-ItemProperty -Path HKLM:\HARDWARE\DESCRIPTION\System\BIOS -Name SystemVersion).SystemVersion'
                - '            $systemManufacturer = (Get-ItemProperty -Path HKLM:\HARDWARE\DESCRIPTION\System\BIOS -Name SystemManufacturer).SystemManufacturer'
                - '        }'
                - '        catch [System.Management.Automation.PSArgumentException] {}'
                - '        finally { $ErrorActionPreference = "Continue" }'
                - '        if (($systemVersion -match "amazon") -and ($systemManufacturer -match "Xen")) {'
                - '            $allowedInstanceType = $true'
                - '        }'
                - '        if ($allowedInstanceType) {'
                - '            Write-Host "Reflecting Boot Critical drivers"'
                - '            Start-Process -PassThru -Wait -FilePath "$env:systemroot\System32\rundll32.exe" -ArgumentList "sppnp.dll,Sysprep_Generalize_Pnp" | Out-Null'
                - '        }'
                - '    }'
                - '    if ($result -eq 0) {'
                - '        Write-Host "NVMe driver installation completed successfully."'
                - '        exit 0'
                - '    }'
                - '    elseif ($result -eq 3010) {'
                - '        Write-Host "NVMe driver installation completed successfully. Reboot required."'
                - '        exit 3010'
                - '    }'
                - '    else {'
                - '        Write-Host "NVMe driver installation failed."'
                - '        exit 1'
                - '    }'
                - '}'
                - catch {
                - '    Write-Host "Error during NVMe driver installation: $($_.Exception.Message)"'
                - '    exit 255'
                - '}'

  WorkspacePatchingDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Name: !Sub 'WorkSpacesMaintenance-${DirectoryId}'
      Content: 
        schemaVersion: '0.3'
        description: |
          Automates the patching of Amazon WorkSpaces using AWS Systems Manager. 
          This automation will:

            1. Discovery: Identifies eligible WorkSpaces (excluding those tagged with Patch: No)
            2. Verification: Checks which WorkSpaces are managed by Systems Manager
            3. Preparation: Starts WorkSpaces and optionally reboots them
            4. Maintenance Mode: Enables manual maintenance mode (ADMIN_MAINTENANCE)
            5. Patching: Applies patches using either AWS-InstallWindowsUpdates (for BYOL) or AWS-RunPatchBaseline
            6. Monitoring: Tracks patch status until completion
            7. Driver Updates: Optionally updates AWS drivers (NVMe and ENA)
            8. Cleanup: Disables maintenance mode and optionally stops AUTO_STOP WorkSpaces
            9. Reporting: Sends patch summary and compliance report to SNS topic

          To exclude a WorkSpace from patching, apply the tag directly to the WorkSpace:

          Key: Patch
          Value: No
        assumeRole: !Sub 'arn:aws:iam::${AWS::AccountId}:role/WorkSpacesMaintenance-${DirectoryId}-Role'
        parameters:
          AutomationAssumeRole:
            type: String
            description: (Required) The ARN of the role that allows Automation to perform the actions on your behalf.
            default: !GetAtt WorkSpacesMaintenanceRole.Arn
          CloudWatchLogGroupName:
            type: String
            description: (Required) CloudWatch Log Group name for streaming logs
            default: !Sub '${CloudWatchLogGroupName}/${DirectoryId}'
          StopWorkspaces:
            type: String
            description: (Required) Whether to stop AUTO_STOP WorkSpaces after patching is complete. Default is Yes
            default: 'Yes'
            allowedValues:
              - 'Yes'
              - 'No'
          Action:
            type: String
            description: (Required) Operation to perform with patching. Default is Install
            default: Install
            allowedValues:
              - Scan
              - Install
          SnsTopicArn:
            type: String
            description: (Optional) The ARN of the SNS Topic to notification with send execution summary
            default: !If 
              - CreateNewSnsTopic
              - !Ref WorkSpacesPatchingTopic
              - !Ref SnsTopicArn
          AllowReboot:
            type: String
            description: (Required) Reboot behavior before patching. Default is RebootIfNeeded
            default: RebootIfNeeded
            allowedValues:
              - NoReboot
              - RebootIfNeeded
          ExcludeKBs:
            type: String
            description: (Optional) Comma-separated list of KB articles to exclude from patching. Default is KB5007651
            default: KB5007651
          GenerateComplianceReport:
            type: String
            description: (Required) Whether to generate a patch compliance report after maintenance. Default is No
            default: !Ref GenerateComplianceReport
            allowedValues:
              - 'Yes'
              - 'No'
          UpdateAWSDrivers:
            type: String
            description: (Required) Whether to update AWS drivers (NVMe, ENA) during maintenance. Default is No
            default: !Ref UpdateAWSDrivers
            allowedValues:
              - 'Yes'
              - 'No'
          StateBucket:
            type: String
            description: (Required) S3 bucket name for storing automation state between steps
            default: !Ref MaintenanceStateBucket
        mainSteps:
          - description: Gets a list of WorkSpaces excluding those tagged with 'Key:Patch Value:No'
            name: getWorkspaces
            action: aws:executeScript
            nextStep: getManagedInstances
            isEnd: false
            inputs:
              Script: |-
                def script_handler(events, context):
                    import boto3
                    import json
                    from datetime import datetime
                    
                    def log_to_cloudwatch(log_group_name, message, log_stream_name=None):
                        try:
                            logs_client = boto3.client('logs')
                            if not log_stream_name:
                                log_stream_name = "workspaces-maintenance-automation"
                            try:
                                logs_client.create_log_stream(logGroupName=log_group_name, logStreamName=log_stream_name)
                            except logs_client.exceptions.ResourceAlreadyExistsException:
                                pass
                            logs_client.put_log_events(
                                logGroupName=log_group_name, logStreamName=log_stream_name,
                                logEvents=[{'timestamp': int(datetime.now().timestamp() * 1000), 'message': message}]
                            )
                        except Exception as e:
                            print(f"Failed to log to CloudWatch: {str(e)}")
                    
                    workspaces = boto3.client('workspaces')
                    s3 = boto3.client('s3')
                    directory_id = events.get('directoryId', '')
                    log_group_name = events.get('logGroupName', '')
                    state_bucket = events.get('stateBucket', '')
                    execution_id = events.get('executionId', '')
                    
                    if not directory_id:
                        raise Exception("DirectoryId parameter is required")
                    
                    state_prefix = f"maintenance-state/{directory_id}/{execution_id}"
                    log_to_cloudwatch(log_group_name, f"Starting WorkSpaces discovery for Directory: {directory_id}")
                    
                    # Batch-fetch all WorkSpace tags using Resource Groups Tagging API
                    tagging = boto3.client('resourcegroupstaggingapi')
                    excluded_ws_ids = set()
                    tag_paginator = tagging.get_paginator('get_resources')
                    for page in tag_paginator.paginate(
                        ResourceTypeFilters=['workspaces:workspace'],
                        TagFilters=[{'Key': 'Patch', 'Values': ['No']}]
                    ):
                        for resource in page['ResourceTagMappingList']:
                            # ARN format: arn:aws:workspaces:region:account:workspace/ws-id
                            ws_id = resource['ResourceARN'].split('/')[-1]
                            excluded_ws_ids.add(ws_id)
                    
                    workspace_ids = []
                    excluded_workspaces = []
                    paginator = workspaces.get_paginator('describe_workspaces')
                    
                    for page in paginator.paginate(DirectoryId=directory_id):
                        for ws in page['Workspaces']:
                            if ws['State'] not in ['PENDING', 'ERROR']:
                                if ws['WorkspaceId'] in excluded_ws_ids:
                                    excluded_workspaces.append(ws['WorkspaceId'])
                                else:
                                    workspace_ids.append(ws['WorkspaceId'])
                    
                    if not workspace_ids:
                        error_msg = f"No eligible WorkSpaces found for patching in Directory {directory_id}"
                        log_to_cloudwatch(log_group_name, error_msg)
                        raise Exception(error_msg)
                    
                    workspace_count = str(len(workspace_ids))
                    excluded_count = str(len(excluded_workspaces))
                    
                    # Store large lists in S3
                    s3.put_object(
                        Bucket=state_bucket,
                        Key=f"{state_prefix}/workspaces.json",
                        Body=json.dumps({'workspaceIds': workspace_ids, 'excludedWorkspaces': excluded_workspaces}),
                        ServerSideEncryption='AES256'
                    )
                    
                    summary_msg = f"Discovery for Directory {directory_id}: Eligible={workspace_count}, Excluded={excluded_count}"
                    print(summary_msg)
                    log_to_cloudwatch(log_group_name, summary_msg)
                    
                    return {
                        'workspaceCount': workspace_count,
                        'excludedCount': excluded_count,
                        'directoryId': directory_id
                    }
              Runtime: python3.11
              InputPayload:
                directoryId: !Ref DirectoryId
                logGroupName: '{{ CloudWatchLogGroupName }}'
                stateBucket: '{{ StateBucket }}'
                executionId: '{{ automation:EXECUTION_ID }}'
              Handler: script_handler
            outputs:
              - Type: String
                Name: workspaceCount
                Selector: $.Payload.workspaceCount
              - Type: String
                Name: excludedCount
                Selector: $.Payload.excludedCount
              - Type: String
                Name: directoryId
                Selector: $.Payload.directoryId
          - description: Identify WorkSpaces that are managed by Systems Manager
            name: getManagedInstances
            action: aws:executeScript
            nextStep: startWorkspaces
            isEnd: false
            inputs:
              Script: |-
                def script_handler(events, context):
                    import boto3
                    import json
                    from datetime import datetime
                    
                    def log_to_cloudwatch(log_group_name, message, log_stream_name=None):
                        try:
                            logs_client = boto3.client('logs')
                            if not log_stream_name:
                                log_stream_name = "workspaces-maintenance-automation"
                            try:
                                logs_client.create_log_stream(logGroupName=log_group_name, logStreamName=log_stream_name)
                            except logs_client.exceptions.ResourceAlreadyExistsException:
                                pass
                            logs_client.put_log_events(
                                logGroupName=log_group_name, logStreamName=log_stream_name,
                                logEvents=[{'timestamp': int(datetime.now().timestamp() * 1000), 'message': message}]
                            )
                        except Exception as e:
                            print(f"Failed to log to CloudWatch: {str(e)}")
                    
                    ssm = boto3.client('ssm')
                    ws_client = boto3.client('workspaces')
                    s3 = boto3.client('s3')
                    directory_id = events['directoryId']
                    log_group_name = events.get('logGroupName', '')
                    state_bucket = events['stateBucket']
                    execution_id = events['executionId']
                    state_prefix = f"maintenance-state/{directory_id}/{execution_id}"
                    
                    # Read workspace IDs from S3
                    obj = s3.get_object(Bucket=state_bucket, Key=f"{state_prefix}/workspaces.json")
                    ws_data = json.loads(obj['Body'].read().decode('utf-8'))
                    workspace_ids = ws_data['workspaceIds']
                    
                    # Build computer name map from WorkSpaces API
                    computer_to_workspace = {}
                    paginator_ws = ws_client.get_paginator('describe_workspaces')
                    for page in paginator_ws.paginate(DirectoryId=directory_id):
                        for ws in page['Workspaces']:
                            if ws['WorkspaceId'] in workspace_ids:
                                computer_to_workspace[ws.get('ComputerName', '')] = ws['WorkspaceId']
                    
                    instance_ids = []
                    matched_workspace_ids = []
                    unmanaged_workspace_ids = workspace_ids.copy()
                    
                    log_to_cloudwatch(log_group_name, "Starting Systems Manager instance discovery")
                    
                    def normalize_computer_name(name):
                        name = name.split('.')[0].lower()
                        return name

                    paginator = ssm.get_paginator('describe_instance_information')
                    for page in paginator.paginate():
                        for instance in page['InstanceInformationList']:
                            ssm_name = normalize_computer_name(instance.get('ComputerName', ''))
                            for ws_name in computer_to_workspace:
                                if ssm_name == normalize_computer_name(ws_name):
                                    instance_ids.append(instance['InstanceId'])
                                    ws_id = computer_to_workspace[ws_name]
                                    matched_workspace_ids.append(ws_id)
                                    if ws_id in unmanaged_workspace_ids:
                                        unmanaged_workspace_ids.remove(ws_id)
                                    break
                    
                    if not instance_ids:
                        error_msg = "No matching WorkSpace instances found in SSM"
                        log_to_cloudwatch(log_group_name, error_msg)
                        raise Exception(error_msg)
                    
                    # Store large lists in S3
                    s3.put_object(
                        Bucket=state_bucket,
                        Key=f"{state_prefix}/managed-instances.json",
                        Body=json.dumps({
                            'instanceIds': instance_ids,
                            'matchedWorkspaceIds': matched_workspace_ids,
                            'unmanagedWorkspaceIds': unmanaged_workspace_ids
                        }),
                        ServerSideEncryption='AES256'
                    )
                    
                    ssm_summary = f"Found {len(instance_ids)} managed, {len(unmanaged_workspace_ids)} unmanaged"
                    print(ssm_summary)
                    log_to_cloudwatch(log_group_name, ssm_summary)
                    
                    return {
                        'unmanagedCount': len(unmanaged_workspace_ids),
                        'matchedWorkspacesCount': str(len(matched_workspace_ids))
                    }
              Runtime: python3.11
              InputPayload:
                directoryId: '{{ getWorkspaces.directoryId }}'
                logGroupName: '{{ CloudWatchLogGroupName }}'
                stateBucket: '{{ StateBucket }}'
                executionId: '{{ automation:EXECUTION_ID }}'
              Handler: script_handler
            outputs:
              - Type: String
                Name: unmanagedCount
                Selector: $.Payload.unmanagedCount
              - Type: String
                Name: matchedWorkspacesCount
                Selector: $.Payload.matchedWorkspacesCount

          - description: Start the managed WorkSpaces
            name: startWorkspaces
            action: aws:executeScript
            nextStep: waitForResume
            isEnd: false
            inputs:
              Script: |-
                def script_handler(events, context):
                    import boto3
                    import json
                    from time import sleep
                    
                    s3 = boto3.client('s3')
                    workspaces = boto3.client('workspaces')
                    state_bucket = events['stateBucket']
                    state_prefix = f"maintenance-state/{events['directoryId']}/{events['executionId']}"
                    
                    obj = s3.get_object(Bucket=state_bucket, Key=f"{state_prefix}/managed-instances.json")
                    data = json.loads(obj['Body'].read().decode('utf-8'))
                    workspace_ids = data['matchedWorkspaceIds']
                    batch_size = 25
                    
                    for i in range(0, len(workspace_ids), batch_size):
                        batch = workspace_ids[i:i + batch_size]
                        try:
                            response = workspaces.start_workspaces(
                                StartWorkspaceRequests=[{'WorkspaceId': w_id} for w_id in batch]
                            )
                            if response['FailedRequests']:
                                print(f"Failed requests: {response['FailedRequests']}")
                            sleep(2)
                        except Exception as e:
                            print(f"Error processing batch: {str(e)}")
                    
                    return {'StatusCode': 200, 'Message': 'WorkSpace start operations completed'}
              Runtime: python3.11
              InputPayload:
                stateBucket: '{{ StateBucket }}'
                directoryId: '{{ getWorkspaces.directoryId }}'
                executionId: '{{ automation:EXECUTION_ID }}'
              Handler: script_handler

          - description: Wait 5 minutes to allow the WorkSpaces to resume from hibernation
            name: waitForResume
            action: aws:sleep
            nextStep: branchRebootWorkspaces
            isEnd: false
            inputs:
              Duration: PT5M

          - name: branchRebootWorkspaces
            action: aws:branch
            inputs:
              Choices:
                - NextStep: rebootWorkspaces
                  Variable: '{{ AllowReboot }}'
                  StringEquals: RebootIfNeeded
              Default: enableAdminMaintenance

          - description: Reboot the managed WorkSpaces if AllowReboot is set to RebootIfNeeded
            name: rebootWorkspaces
